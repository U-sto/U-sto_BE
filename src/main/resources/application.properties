spring.application.name=core

#JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true

logging.level.root=INFO

g2b.api.key=${G2B_API_KEY}

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
yun.mail.username = ${MAIL_USERNAME_YUN}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.auth-code-expiration-millis=1800000

# sms
coolsms.api.key=${SMS_API_KEY}
coolsms.api.secret=${SMS_API_SECRET}
coolsms.api.from=${SMS_API_FROM}

# swagger
server.forward-headers-strategy=framework
springdoc.swagger-ui.tags-sorter=alpha

# Session Configuration
server.servlet.session.timeout=8h
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/

# custiom logging info
logging.level.com.usto.api.common.filter.SessionDebugFilter=INFO

# Spring Security is warn for only needed info
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# ai team
ai.server.api-key= ${AI_API_KEY}
ai.server.base-url=${AI_SERVER_BASE_URL}
ai.server.endpoints.chat=/api/ai/chat
ai.server.endpoints.forecast=/api/ai/forecast
ai.server.timeout.chat=60s
ai.server.timeout.forecast=30s
#spring ai test by key
spring.ai.openai.api-key = ${AI_API_KEY}
spring.ai.openai.chat.options.model= gpt-4o-mini
spring.ai.openai.chat.options.proxy.timeout=120s

# ── CORS 추가 허용 오리진 ───────────────────────────────────────────────────
# 로컬 개발 시 ngrok 주소 등을 쉼표로 구분하여 주입 (운영 환경에서는 빈 값 유지)
# 예: CORS_EXTRA_ORIGINS=https://xxx.ngrok-free.dev,https://yyy.ngrok-free.dev
cors.extra-origins=${CORS_EXTRA_ORIGINS:}
# ────────────────────────────────────────────────────────────────────────────

# ── Redis (Cache Layer) ──────────────────────────────────────────────────────
# 운영 환경에서는 application-prod.properties 의 환경변수로 override
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=-1ms
# ────────────────────────────────────────────────────────────────────────────

# ── Actuator / Prometheus ────────────────────────────────────────────────────
# /actuator/prometheus 를 Prometheus scraper 에 개방
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=when-authorized
# NOTE: SecurityConfig 에서 /actuator/prometheus 를 permitAll() 로 열어 주세요.
# ────────────────────────────────────────────────────────────────────────────

# ── ELK (Logstash) ──────────────────────────────────────────────────────────
# logback-spring.xml 이 참조하는 값 (prod 프로파일에서 실제 호스트로 override)
logstash.host=${LOGSTASH_HOST:localhost}
logstash.port=${LOGSTASH_PORT:5000}
# ────────────────────────────────────────────────────────────────────────────

# ── Slack Alerting ───────────────────────────────────────────────────────────
slack.webhook.url=${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/<YOUR_TOKEN>}
# ────────────────────────────────────────────────────────────────────────────
